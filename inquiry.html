<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry - Khaima Catering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/inquiry.css">
</head>

<body class="inquiry-page">
    <a href="menu.html" class="inquiry-back">← Back to menus</a>

    <div class="inquiry-layout">
        <aside class="inquiry-panel">
            <h1 class="inquiry-panel-title">Khaima</h1>
            <p class="inquiry-panel-subline">Tell us about your plans</p>
            <p class="inquiry-panel-italic">We read every submission. We reply within 24 hours. We'd love to work with you.</p>
            <hr class="inquiry-panel-hr">
            <div class="inquiry-panel-contact">
                <div class="contact-item-block">
                    <p class="tap-hint">Email</p>
                    <a href="mailto:thibault@epevents.net" class="inquiry-panel-link">thibault@epevents.net</a>
                </div>
                <div class="contact-item-block">
                    <p class="tap-hint">Phone</p>
                    <a href="tel:+66838798876" class="inquiry-panel-link">+66 83 879 8876</a>
                </div>
            </div>
        </aside>

        <main class="inquiry-main">
            <form id="inquiryForm" class="inquiry-form" novalidate>
                <div class="inquiry-field">
                    <label for="name">Your name</label>
                    <input type="text" id="name" name="name" required>
                    <span class="inquiry-error" id="error-name" aria-live="polite"></span>
                </div>

                <div class="inquiry-field">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" required>
                    <span class="inquiry-error" id="error-email" aria-live="polite"></span>
                </div>

                <div class="inquiry-field">
                    <label>Type of event</label>
                    <div class="inquiry-pills" role="group" aria-label="Type of event">
                        <input type="radio" name="event_type" id="ev-yoga" value="Yoga Retreat" required>
                        <label for="ev-yoga">Yoga Retreat</label>
                        <input type="radio" name="event_type" id="ev-wellness" value="Wellness Retreat">
                        <label for="ev-wellness">Wellness Retreat</label>
                        <input type="radio" name="event_type" id="ev-villa" value="Villa Dinner">
                        <label for="ev-villa">Villa Dinner</label>
                        <input type="radio" name="event_type" id="ev-private" value="Private Event">
                        <label for="ev-private">Private Event</label>
                        <input type="radio" name="event_type" id="ev-other" value="Other">
                        <label for="ev-other">Other</label>
                    </div>
                    <span class="inquiry-error" id="error-event_type" aria-live="polite"></span>
                </div>

                <div class="inquiry-field">
                    <label for="location">Location on Koh Phangan</label>
                    <input type="text" id="location" name="location" placeholder="Villa name, area, or address" required>
                    <span class="inquiry-error" id="error-location" aria-live="polite"></span>
                </div>

                <div class="inquiry-field">
                    <label for="guests">Number of guests</label>
                    <input type="number" id="guests" name="guests" placeholder="e.g. 12" min="1" required>
                    <span class="inquiry-error" id="error-guests" aria-live="polite"></span>
                </div>

                <div class="inquiry-field inquiry-dates">
                    <label>Dates <span class="inquiry-date-hint">(click to open calendar)</span></label>
                    <div class="inquiry-date-row">
                        <div class="inquiry-field-inline">
                            <label for="date_from">From</label>
                            <input type="date" id="date_from" name="date_from" required>
                        </div>
                        <div class="inquiry-field-inline">
                            <label for="date_to">To</label>
                            <input type="date" id="date_to" name="date_to" required>
                        </div>
                    </div>
                    <span class="inquiry-error" id="error-dates" aria-live="polite"></span>
                </div>

                <div class="inquiry-field">
                    <label>Meals needed</label>
                    <div class="inquiry-pills inquiry-pills-multi" role="group" aria-label="Meals needed">
                        <input type="checkbox" name="meals" id="meal-breakfast" value="Breakfast">
                        <label for="meal-breakfast">Breakfast</label>
                        <input type="checkbox" name="meals" id="meal-lunch" value="Lunch">
                        <label for="meal-lunch">Lunch</label>
                        <input type="checkbox" name="meals" id="meal-dinner" value="Dinner">
                        <label for="meal-dinner">Dinner</label>
                        <input type="checkbox" name="meals" id="meal-fullday" value="Full Day">
                        <label for="meal-fullday">Full Day</label>
                    </div>
                    <span class="inquiry-error" id="error-meals" aria-live="polite"></span>
                </div>

                <div class="inquiry-field">
                    <label>Dietary requirements</label>
                    <div class="inquiry-pills inquiry-pills-multi" role="group" aria-label="Dietary requirements">
                        <input type="checkbox" name="dietary" id="diet-veg" value="Vegetarian">
                        <label for="diet-veg">Vegetarian</label>
                        <input type="checkbox" name="dietary" id="diet-vegan" value="Vegan">
                        <label for="diet-vegan">Vegan</label>
                        <input type="checkbox" name="dietary" id="diet-gf" value="Gluten-free">
                        <label for="diet-gf">Gluten-free</label>
                        <input type="checkbox" name="dietary" id="diet-none" value="No restrictions">
                        <label for="diet-none">No restrictions</label>
                    </div>
                    <span class="inquiry-error" id="error-dietary" aria-live="polite"></span>
                </div>

                <div class="inquiry-field">
                    <label for="notes">Anything else we should know?</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Optional"></textarea>
                </div>

                <button type="submit" class="inquiry-submit">Send inquiry</button>
            </form>

            <div id="inquirySuccess" class="inquiry-success" hidden>
                <p class="inquiry-success-text">Thank you. We'll be in touch shortly.</p>
                <p class="inquiry-success-email" id="inquirySuccessEmail"></p>
            </div>

            <p id="inquirySubmitError" class="inquiry-submit-error" hidden></p>
        </main>
    </div>

    <!-- TODO: replace with your Formspree endpoint ID (in js/inquiry.js FORMSPREE_URL) -->
    <script src="js/inquiry.js"></script>
</body>

</html>
